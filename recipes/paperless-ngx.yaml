name: paperless-ngx
display_name: Paperless-ngx
description: Document management system that transforms physical documents into a searchable archive.
categories:
  - productivity
app_version: "2.14.7"
recipe_version: "1.0.0"
recipe_type: docker-compose
upstream_url: https://github.com/paperless-ngx/paperless-ngx

app_min_ram_mb: 2048
app_min_disk_mb: 20480

supported_os:
  - ubuntu-26.04

ports:
  - port: 8000
    protocol: tcp
    public: true
    description: Paperless-ngx Web UI

parameters:
  - name: APP_DOMAIN
    display_name: Domain
    type: domain
    required: true
    description: Domain for accessing Paperless-ngx (e.g., docs.example.com).
  - name: ADMIN_USER
    display_name: Admin Username
    type: string
    required: true
    description: Initial admin username.
  - name: ADMIN_PASSWORD
    display_name: Admin Password
    type: password
    required: false
    auto_generate: true
    description: Initial admin password (auto-generated if not provided).
  - name: DB_PASSWORD
    display_name: Database Password
    type: password
    required: false
    auto_generate: true
    description: PostgreSQL password (auto-generated if not provided).
  - name: SECRET_KEY
    display_name: Secret Key
    type: password
    required: false
    auto_generate: true
    description: Django secret key (auto-generated if not provided).

incompatible_with_apps: []
