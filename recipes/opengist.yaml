name: opengist
display_name: OpenGist
description: Self-hosted pastebin and Gist service powered by Git.
categories:
  - developer-tools
app_version: "1.8.4"
recipe_version: "1.0.0"
recipe_type: docker-compose
upstream_url: https://github.com/nicholaswilde/opengist

app_min_ram_mb: 256
app_min_disk_mb: 5120

supported_os:
  - ubuntu-26.04

ports:
  - port: 6157
    protocol: tcp
    public: true
    description: OpenGist Web UI
  - port: 2222
    protocol: tcp
    public: true
    description: OpenGist SSH (Git clone)

parameters:
  - name: APP_DOMAIN
    display_name: Domain
    type: domain
    required: true
    description: Domain for accessing OpenGist (e.g., gist.example.com).
  - name: SECRET_KEY
    display_name: Secret Key
    type: password
    required: false
    auto_generate: true
    description: Secret key for session security (auto-generated if not provided).

incompatible_with_apps: []
