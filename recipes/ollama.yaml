id: ollama
name: ollama
display_name: Ollama
description: Run large language models locally
categories: [ai]
app_version: 0.7.1
recipe_type: docker-compose
upstream_url: https://ollama.ai
app_min_ram_mb: 8192
app_min_disk_mb: 51200
supported_os: [ubuntu-26.04]
incompatible_with_apps: [openclaw]
parameters:
  - name: APP_DOMAIN
    display_name: Domain
    type: domain
    required: true
    description: Domain for Ollama API
  - name: OLLAMA_DEFAULT_MODEL
    display_name: Default Model
    type: string
    required: false
    default: llama3
    description: Model to pull on startup (e.g. llama3, mistral)
ports:
  - port: 11434
    protocol: tcp
    public: true
    description: Ollama API
