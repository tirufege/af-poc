name: uptime-kuma
display_name: Uptime Kuma
description: Self-hosted monitoring tool for tracking uptime of websites and services.
categories:
  - monitoring
app_version: "1.23.16"
recipe_version: "1.0.0"
recipe_type: docker-compose
upstream_url: https://github.com/louislam/uptime-kuma

app_min_ram_mb: 256
app_min_disk_mb: 2048

supported_os:
  - ubuntu-26.04

ports:
  - port: 3001
    protocol: tcp
    public: true
    description: Uptime Kuma Web UI

parameters:
  - name: APP_DOMAIN
    display_name: Domain
    type: domain
    required: true
    description: Domain for accessing Uptime Kuma (e.g., status.example.com).

incompatible_with_apps: []
