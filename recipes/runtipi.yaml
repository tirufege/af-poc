name: runtipi
display_name: Runtipi
description: Self-hosted app store and homeserver manager for easy application deployment.
categories:
  - infrastructure
app_version: "3.7.0"
recipe_version: "1.0.0"
recipe_type: docker-compose
upstream_url: https://github.com/runtipi/runtipi

app_min_ram_mb: 1024
app_min_disk_mb: 20480

supported_os:
  - ubuntu-26.04

ports:
  - port: 80
    protocol: tcp
    public: true
    description: Runtipi Web UI (HTTP)
  - port: 443
    protocol: tcp
    public: true
    description: Runtipi Web UI (HTTPS)

parameters:
  - name: APP_DOMAIN
    display_name: Domain
    type: domain
    required: true
    description: Domain for accessing Runtipi (e.g., tipi.example.com).
  - name: JWT_SECRET
    display_name: JWT Secret
    type: password
    required: false
    auto_generate: true
    description: Secret for JWT token signing (auto-generated if not provided).
  - name: POSTGRES_PASSWORD
    display_name: Database Password
    type: password
    required: false
    auto_generate: true
    description: PostgreSQL database password (auto-generated if not provided).

notes: |
  Runtipi manages its own Docker containers and requires access to the Docker socket.
  It will deploy additional apps directly on the host Docker engine.

incompatible_with_apps: []
