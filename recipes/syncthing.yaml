name: syncthing
display_name: Syncthing
description: Continuous peer-to-peer file synchronization between devices.
categories:
  - productivity
app_version: "v1.29.6"
recipe_version: "1.0.0"
recipe_type: docker-compose
upstream_url: https://github.com/syncthing/syncthing

app_min_ram_mb: 256
app_min_disk_mb: 10240

supported_os:
  - ubuntu-26.04

ports:
  - port: 8384
    protocol: tcp
    public: true
    description: Syncthing Web UI
  - port: 22000
    protocol: tcp
    public: true
    description: Syncthing sync (TCP)
  - port: 22000
    protocol: udp
    public: true
    description: Syncthing sync (QUIC/UDP)

parameters:
  - name: APP_DOMAIN
    display_name: Domain
    type: domain
    required: true
    description: Domain for accessing Syncthing (e.g., sync.example.com).
  - name: PUID
    display_name: User ID
    type: integer
    required: false
    default: 1000
    description: User ID for file ownership.
  - name: PGID
    display_name: Group ID
    type: integer
    required: false
    default: 1000
    description: Group ID for file ownership.

incompatible_with_apps: []
