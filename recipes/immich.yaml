name: immich
display_name: Immich
description: High-performance self-hosted photo and video management solution.
categories:
  - media
app_version: "1.130.2"
recipe_version: "1.0.0"
recipe_type: docker-compose
upstream_url: https://github.com/immich-app/immich

app_min_ram_mb: 4096
app_min_disk_mb: 51200

supported_os:
  - ubuntu-26.04

ports:
  - port: 2283
    protocol: tcp
    public: true
    description: Immich Web UI

parameters:
  - name: APP_DOMAIN
    display_name: Domain
    type: domain
    required: true
    description: Domain for accessing Immich (e.g., photos.example.com).
  - name: DB_PASSWORD
    display_name: Database Password
    type: password
    required: false
    auto_generate: true
    description: PostgreSQL database password (auto-generated if not provided).
  - name: REDIS_PASSWORD
    display_name: Redis Password
    type: password
    required: false
    auto_generate: true
    description: Redis password (auto-generated if not provided).

incompatible_with_apps: []
