name: guacamole
display_name: Apache Guacamole
description: Clientless remote desktop gateway supporting VNC, RDP, and SSH via browser.
categories:
  - infrastructure
app_version: "1.5.5"
recipe_version: "1.0.0"
recipe_type: docker-compose
upstream_url: https://github.com/apache/guacamole-server

app_min_ram_mb: 1024
app_min_disk_mb: 10240

supported_os:
  - ubuntu-26.04

ports:
  - port: 8080
    protocol: tcp
    public: true
    description: Apache Guacamole Web UI

parameters:
  - name: APP_DOMAIN
    display_name: Domain
    type: domain
    required: true
    description: Domain for accessing Guacamole (e.g., remote.example.com).
  - name: DB_PASSWORD
    display_name: Database Password
    type: password
    required: false
    auto_generate: true
    description: PostgreSQL database password (auto-generated if not provided).
  - name: GUACADMIN_PASSWORD
    display_name: Admin Password
    type: password
    required: false
    auto_generate: true
    description: Initial guacadmin password (auto-generated if not provided).

incompatible_with_apps: []
