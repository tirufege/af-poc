name: pihole
display_name: Pi-hole
description: Network-wide DNS ad-blocker that acts as a DNS sinkhole.
categories:
  - security
app_version: "2024.07.0"
recipe_version: "1.0.0"
recipe_type: docker-compose
upstream_url: https://github.com/pi-hole/pi-hole

app_min_ram_mb: 256
app_min_disk_mb: 2048

supported_os:
  - ubuntu-26.04

ports:
  - port: 8080
    protocol: tcp
    public: true
    description: Pi-hole Web UI
  - port: 53
    protocol: tcp
    public: false
    description: DNS (TCP)
  - port: 53
    protocol: udp
    public: false
    description: DNS (UDP)

parameters:
  - name: APP_DOMAIN
    display_name: Domain
    type: domain
    required: true
    description: Domain for accessing Pi-hole (e.g., pihole.example.com).
  - name: WEBPASSWORD
    display_name: Web Password
    type: password
    required: false
    auto_generate: true
    description: Password for the Pi-hole web interface (auto-generated if not provided).

incompatible_with_apps:
  - adguard-home
