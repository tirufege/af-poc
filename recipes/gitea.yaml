name: gitea
display_name: Gitea
description: Lightweight self-hosted Git service with web interface.
categories:
  - developer-tools
app_version: "1.22.6"
recipe_version: "1.0.0"
recipe_type: docker-compose
upstream_url: https://github.com/go-gitea/gitea

app_min_ram_mb: 512
app_min_disk_mb: 20480

supported_os:
  - ubuntu-26.04

ports:
  - port: 3000
    protocol: tcp
    public: true
    description: Gitea Web UI
  - port: 2222
    protocol: tcp
    public: true
    description: Gitea SSH

parameters:
  - name: APP_DOMAIN
    display_name: Domain
    type: domain
    required: true
    description: Domain for accessing Gitea (e.g., git.example.com).
  - name: POSTGRES_PASSWORD
    display_name: Database Password
    type: password
    required: false
    auto_generate: true
    description: PostgreSQL password (auto-generated if not provided).
  - name: GITEA_ADMIN_USER
    display_name: Admin Username
    type: string
    required: true
    description: Initial admin username.
  - name: GITEA_ADMIN_EMAIL
    display_name: Admin Email
    type: email
    required: true
    description: Email address for the admin account.
  - name: GITEA_ADMIN_PASSWORD
    display_name: Admin Password
    type: password
    required: false
    auto_generate: true
    description: Initial admin password (auto-generated if not provided).

incompatible_with_apps: []
