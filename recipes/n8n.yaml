id: n8n
name: n8n
display_name: n8n
description: Workflow automation platform
categories: [automation, ai]
app_version: 1.94.1
recipe_type: docker-compose
upstream_url: https://n8n.io
app_min_ram_mb: 2048
app_min_disk_mb: 20480
supported_os: [ubuntu-26.04]
incompatible_with_apps: []
parameters:
  - name: APP_DOMAIN
    display_name: Domain
    type: domain
    required: true
    description: Subdomain for n8n (e.g. n8n.example.com)
  - name: N8N_ADMIN_EMAIL
    display_name: Admin Email
    type: email
    required: true
    description: Admin email address
  - name: POSTGRES_PASSWORD
    display_name: Database Password
    type: password
    required: true
    auto_generate: true
    description: PostgreSQL password (auto-generated if empty)
  - name: N8N_ENCRYPTION_KEY
    display_name: Encryption Key
    type: password
    required: true
    auto_generate: true
    description: Secret key for n8n encryption
ports:
  - port: 5678
    protocol: tcp
    public: true
    description: n8n Web UI
